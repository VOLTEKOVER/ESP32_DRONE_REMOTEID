name: Build Firmware

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'images/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ESP_IDF_VERSION: v6.0.1

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ESP-IDF ${{ env.ESP_IDF_VERSION }}
        uses: espressif/esp-idf-cargo-action@v1
        with:
          esp_idf_version: ${{ env.ESP_IDF_VERSION }}

      - name: Set build target
        run: idf.py set-target ${{ matrix.target }}
        shell: bash

      - name: Configure partition table for OTA
        run: |
          idf.py menuconfig -s
          echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_CUSTOM_FILENAME=\"partitions.csv\"" >> sdkconfig
          echo "CONFIG_PARTITION_TABLE_FILENAME=\"partitions.csv\"" >> sdkconfig
        shell: bash

      - name: Build firmware
        run: idf.py build
        shell: bash

      - name: Collect build artifacts
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp build/bootloader/bootloader.bin artifacts/${{ matrix.target }}/
          cp build/partition_table/partition-table.bin artifacts/${{ matrix.target }}/
          cp build/*.bin artifacts/${{ matrix.target }}/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: artifacts/
